<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Alpha Pension Calculator</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="container">
        <div class="header">
            <h2>Alpha Pension Calculator</h2>
            <a href="https://github.com/bealesd/alpha-pension" target="_blank" rel="noopener noreferrer" class="github-link" title="View source code on GitHub">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
            </a>
        </div>

        <!-- Wrap the contents in a form -->
        <form id="pension-form">
            <div class="grid">
                <div class="field">
                    <label>Age</label>
                    <input type="number" id="age" value="40" min="18" max="75" step="1" required>
                </div>

                <div class="field">
                    <label>Retirement Age</label>
                    <!-- Note: I changed max to 68 as per your HTML, but you can adjust -->
                    <input type="number" id="retirement-age" value="68" step="1" min="55" max="68" required>
                </div>

                <div class="field">
                    <label>CPI %</label>
                    <input type="number" id="cpi" value="0" min="0" max="50" step="0.1" required>
                </div>

                <div class="field">
                    <label>Salary</label>
                    <input type="number" id="salary" value="40000" min="27000" max="1000000" step="1" data-step="500" required>
                </div>

                <div class="field">
                    <label>Accrued</label>
                    <input type="number" id="accrued" value="5000" step="1" data-step="500" required>
                </div>
            </div>
        </form>

        <br>

        <table id="tbl">
            <tbody></tbody>
        </table>
        <button id="add-added-pension-row">Add</button>
        <button id="reset-form" type="button">Reset Data</button>

        <div class="pension-forecast">£ <span id="pension-forecast-value">0</span></div>
    </div>

    <template id="added-pension-row">
        <tr>
            <td>
                <select class="type">
                    <option value="self">Self</option>
                    <option value="dependants" selected>Dependants</option>
                </select>
            </td>
            <td>
                <select class="period">
                    <option value="month">Month</option>
                    <option value="year">Year</option>
                </select>
            </td>
            <td>
                <input class="added-pension-payment" placeholder="£" step="1" type="number" min="100" max="20000" data-step="100">
            </td>
        </tr>
    </template>

    <script type="module" src="javascript/pension-calculator-ui.js"></script>

</body>

</html>
