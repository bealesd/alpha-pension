<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Alpha Pension Calculator</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="container">
        <h2>Alpha Pension Calculator</h2>

        <div class="grid">

            <div class="field">
                <label>Age</label>
                <input type="number" id="age" value="40" min="18" max="75" step="1">
            </div>

            <div class="field">
                <label>Retirement Age</label>
                <input type="number" id="retAge" value="68" step="1" min="55" max="75">
            </div>

            <div class="field">
                <label>CPI %</label>
                <input type="number" id="cpi" value="0" min="0" max="50" step="0.1">
            </div>

            <div class="field">
                <label>Salary</label>
                <input type="number" id="salary" value="40000" min="27000" max="1000000" step="500">
            </div>

            <div class="field">
                <label>Accrued</label>
                <input type="number" id="accrued" value="5000" step="500">
            </div>

        </div>

        <br>

        <table id="tbl">
            <tbody></tbody>
        </table>
        <button id="add">Add</button>

        <div class="result">£ <span id="res">0</span></div>
    </div>

    <template id="row">
        <tr>
            <td>
                <select class="type">
                    <option value="self">Self</option>
                    <option value="dependants">Dependants</option>
                </select>
            </td>
            <td>
                <select class="period">
                    <option value="month">Month</option>
                    <option value="year">Year</option>
                </select>
            </td>
            <td>
                <input class="amt amount-input" placeholder="£">
            </td>
        </tr>
    </template>

    <script type="module" src="javascript/pension-calculator-ui.js"></script>

</body>

</html>
